<head>

  <title>Uncertain Decisions</title>
</head>
<body>

  <main>

    <div class="content">

      <div class="answer-container">

      <button disabled id="obtainAnswerBtn" class="btn">Get Answered</button>

    </div>

  </main>

  <script src="script.js"></script>
